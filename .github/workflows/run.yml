name: Fetch Nasdaq Data

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Chrome
        run: |
          sudo apt update
          sudo apt install -y chromium-browser

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: pip install selenium pandas openpyxl webdriver-manager

      - name: Run script
        run: python script.py

      - name: Commit and push Excel file
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add nasdaq.xlsx
          git commit -m "update nasdaq data" || echo "No changes"
          git push
