name: Fetch Nasdaq Data

on:
  schedule:
    - cron: '0 22 * * *'  # 日本時間7時
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install libraries
        run: pip install requests beautifulsoup4 pandas openpyxl

      - name: Run script
        run: python script.py
